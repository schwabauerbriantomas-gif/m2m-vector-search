global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'm2m-coordinator'
    static_configs:
      - targets: ['coordinator:8000']
    metrics_path: '/metrics'
    
  - job_name: 'm2m-edge-nodes'
    static_configs:
      - targets:
        - 'edge-1:8000'
        - 'edge-2:8000'
        - 'edge-3:8000'
    metrics_path: '/metrics'
